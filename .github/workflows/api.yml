name: Prueba Real

on: workflow_dispatch

jobs:
  compilar:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Crear proyecto
        run: |
          mkdir -p TestApp/TestApp
          
          cat > TestApp/project.yml << 'END'
          name: TestApp
          targets:
            TestApp:
              type: application
              platform: iOS
              sources: [TestApp]
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.test.app
                CODE_SIGN_IDENTITY: ""
                CODE_SIGNING_REQUIRED: NO
                CODE_SIGNING_ALLOWED: NO
          END
          
          cat > TestApp/TestApp/AppDelegate.swift << 'END'
          import UIKit
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window!.rootViewController = UIViewController()
                  window!.makeKeyAndVisible()
                  return true
              }
          }
          END
          
          cat > TestApp/TestApp/Info.plist << 'END'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleName</key>
              <string>TestApp</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
          </dict>
          </plist>
          END
          
          cd TestApp && xcodegen generate

      - name: Compilar
        run: |
          xcodebuild -project TestApp/TestApp.xcodeproj -scheme TestApp -sdk iphoneos -archivePath $RUNNER_TEMP/TestApp.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO archive

      - name: Crear IPA
        run: |
          APP=$(find $RUNNER_TEMP/TestApp.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r TestApp.ipa Payload
          mv TestApp.ipa $RUNNER_TEMP/

      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp.ipa
          path: ${{ runner.temp }}/TestApp.ipa